version: v1

common_model_settings:
  temperature: 0.0
  timeout:
    connect: 10.0
    read: 120.0

default_profile_by_capability:
  chat: default.chat.mistral
  language: default.language.mistral

profiles:
  - profile_id: default.chat.mistral
    capability: chat
    description: "Default chat model."
    model:
      provider: openai
      name: mistral-medium-2508
      settings:
        base_url: https://api.mistral.ai/v1
        max_retries: 2

  - profile_id: default.language.mistral
    capability: language
    description: "Default language model for structured text tasks."
    model:
      provider: openai
      name: mistral-medium-2508
      settings:
        base_url: https://api.mistral.ai/v1
        max_retries: 2

  - profile_id: mock.chat
    capability: chat
    description: "Local mock model for offline testing."
    model:
      provider: openai
      name: gpt-4o
      settings:
        base_url: http://localhost:8383/v1

  - profile_id: mock.language
    capability: language
    description: "Local mock model for offline testing."
    model:
      provider: openai
      name: gpt-4o
      settings:
        base_url: http://localhost:8383/v1

rules: []
