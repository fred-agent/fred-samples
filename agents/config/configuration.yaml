app:
  name: "Fred Sample Agents"
  base_url: "/samples/agents/v1"
  port: 8010
  log_level: "debug"
  metrics_address: "127.0.0.1"
  metrics_port: 9115

security:
  m2m:
    enabled: false
    realm_url: "http://app-keycloak:8080/realms/app"
    client_id: "agentic"
  user:
    enabled: false
    realm_url: "http://app-keycloak:8080/realms/app"
    client_id: "app"
  authorized_origins: []

ai:
  knowledge_flow_url: "http://localhost:8111/knowledge-flow/v1"
  timeout:
    connect: 5
    read: 30

observability:
  tracer: logging     # null | logging | langfuse
  metrics: prometheus    # null | logging | prometheus

storage:
  postgres:
    sqlite_path: "~/.fred/fred-samples/agents.sqlite3"

scheduler:
  enabled: false

platform:
  control_plane_url: "http://localhost:8222/control-plane/v1"
